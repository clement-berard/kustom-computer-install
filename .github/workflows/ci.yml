name: Build Test

on:
  pull_request:
    branches:
      - main

jobs:
  build-linux-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Go binaries
        working-directory: go
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-mingw-w64-x86-64 musl-tools

      - name: Install Rust targets
        run: |
          rustup update stable
          rustup target add \
            x86_64-unknown-linux-musl \
            x86_64-pc-windows-gnu

      - name: Build Rust binaries (Linux + Windows)
        working-directory: rust
        run: |
          BINARY_NAME="kc-cli"
          mkdir -p dist

          cargo build --release --target x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/$BINARY_NAME dist/$BINARY_NAME-linux-x64

          cargo build --release --target x86_64-pc-windows-gnu
          cp target/x86_64-pc-windows-gnu/release/$BINARY_NAME.exe dist/$BINARY_NAME-windows-x64.exe

      - name: Upload artifacts (Linux + Windows)
        uses: actions/upload-artifact@v4
        with:
          name: binaries-linux-windows
          path: |
            go/builds/*
            rust/dist/*

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust targets
        run: |
          rustup update stable
          rustup target add \
            aarch64-apple-darwin \
            x86_64-apple-darwin

      - name: Build Rust binaries (macOS)
        working-directory: rust
        run: |
          chmod +x build.sh
          ./build.sh

