name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Go binaries
        working-directory: go
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-mingw-w64-x86-64 musl-tools

      - name: Install Rust targets
        run: |
          rustup update stable
          rustup target add x86_64-unknown-linux-musl x86_64-pc-windows-gnu

      - name: Build Rust binaries (Linux + Windows)
        working-directory: rust
        run: |
          chmod +x build.sh
          ./build.sh linux-x64 windows-x64

      - name: Upload artifacts (Linux + Windows)
        uses: actions/upload-artifact@v4
        with:
          name: binaries-linux-windows
          path: |
            go/builds/*
            rust/dist/*

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust targets
        run: |
          rustup update stable
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build Rust binaries (macOS)
        working-directory: rust
        run: |
          chmod +x build.sh
          ./build.sh macos-arm64 macos-x64

      - name: Upload artifacts (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: binaries-macos
          path: rust/dist/*

  release:
    runs-on: ubuntu-latest
    needs: [build-linux-windows, build-macos]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/**/*
